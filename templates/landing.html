<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwapStyle — Troque roupas com estilo e segurança</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#FCF7F4;
  --primary:#D46A84;
  --primary-dark:#A94B63;
  --plum:#3A1F2D;
  --text:#24161E;
  --muted:#7E6671;
  --border:#EEDDE4;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}

.container{width:min(1100px,90%);margin:auto}

header{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 0;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:900;
}

.logo span{color:var(--primary)}

.btn{
  padding:12px 22px;
  border-radius:30px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.btn-primary{
  background:var(--primary);
  color:#fff;
}

.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  align-items:center;
  padding:60px 0;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:48px;
  line-height:1.1;
}

.hero p{
  color:var(--muted);
  margin:20px 0;
  line-height:1.6;
}

.hero img{
  width:100%;
  border-radius:20px;
}

.section{
  padding:60px 0;
  text-align:center;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:30px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:20px;
  border:1px solid var(--border);
}

.auth{
  background:#fff;
  padding:40px;
  border-radius:20px;
  margin-top:40px;
  border:1px solid var(--border);
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid var(--border);
}

.social{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:15px;
}

.social button{
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#fff;
  cursor:pointer;
}

@media(max-width:800px){
  .hero{grid-template-columns:1fr}
  .cards{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

<header>
  <div class="logo">Swap<span>Style</span></div>
  <button class="btn btn-primary">Entrar</button>
</header>

<section class="hero">
  <div>
    <h1>Troque roupas com estilo e segurança</h1>
    <p>
      Descubra peças incríveis, faça matches e renove seu guarda-roupa com praticidade.
    </p>
    <button class="btn btn-primary">Criar conta grátis</button>
  </div>

  <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="">
</section>

<section class="section">
  <h2>Por que usar?</h2>

  <div class="cards">
    <div class="card">💫 Match de peças</div>
    <div class="card">🔐 Trocas seguras</div>
    <div class="card">💰 Economia inteligente</div>
  </div>
</section>

<section class="section">
  <h2>Crie sua conta</h2>

  <div class="auth">

    <div class="social">
      <button> Continuar com Apple</button>
      <button>Continuar com Google</button>
      <button>Continuar com telefone</button>
    </div>

    <p>ou cadastre com e-mail</p>

    <form onsubmit="doCadastro(event)">
      <input type="text" id="nome" placeholder="Nome" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="username" placeholder="@username" required>
      <input type="password" id="senha" placeholder="Senha" required>
      <input type="password" id="senha2" placeholder="Confirmar senha" required>

      <button class="btn btn-primary" style="width:100%">Criar conta</button>
    </form>

    <div id="erro" style="color:red;margin-top:10px"></div>

  </div>
</section>

</div>

<script>
async function doCadastro(e){
  e.preventDefault();

  const senha = document.getElementById('senha').value;
  const senha2 = document.getElementById('senha2').value;

  if(senha !== senha2){
    document.getElementById('erro').innerText = "Senhas não conferem";
    return;
  }

  const body = {
    nome: document.getElementById('nome').value,
    email: document.getElementById('email').value,
    username: document.getElementById('username').value,
    senha: senha
  };

  const r = await fetch('/api/cadastro',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });

  const d = await r.json();

  if(r.ok){
    window.location = "/app";
  }else{
    document.getElementById('erro').innerText = d.error;
  }
}
</script>

</body>
</html>
